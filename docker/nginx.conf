server {
    listen 80;
    server_name _;
    root /var/www/html/public;
    index index.php;

    server_tokens off;
    charset utf-8;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    error_page 404 /index.php;

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_pass app:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Cache built Vite assets aggressively (hashed filenames)
    location ~* ^/build/.*\.(js|css|svg|woff2?|ttf|eot|png|jpg|jpeg|gif|webp|avif)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # Deny access to hidden files (.env, .git, etc.)
    location ~ /\.(?!well-known).* {
        deny all;
    }
}
